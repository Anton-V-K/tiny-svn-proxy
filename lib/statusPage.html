<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{title}}</title>
    <link rel="stylesheet" href="/api/style.css" />
  </head>
  <body>
    <div class="card">
      <h1><span class="ok">running</span> {{title}}</h1>
      <p>{{message}}</p>

      <div class="meta">
        <div class="k">git hash</div>
        <div><code title="{{gitShaFull}}">{{gitShaShort}}</code></div>
        <div class="k">status</div>
        <div><code>{{statusCode}}</code></div>
      </div>

      <p class="hint">Try proxying SVN HTTPS like this:</p>
      <pre><code>/api/https/&lt;svn-host&gt;/&lt;svn-path&gt;
/api/http/&lt;svn-host&gt;/&lt;svn-path&gt;</code></pre>
    </div>
  </body>
</html>
