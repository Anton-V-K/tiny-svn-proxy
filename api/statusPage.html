<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{title}}</title>
    <style>
      :root { color-scheme: light dark; }
      body { font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji"; margin: 0; padding: 40px 20px; }
      .card { max-width: 880px; margin: 0 auto; border: 1px solid rgba(127,127,127,.35); border-radius: 14px; padding: 22px; background: rgba(127,127,127,.06); }
      h1 { margin: 0 0 10px 0; font-size: 20px; }
      p { margin: 10px 0; line-height: 1.45; }
      code, pre { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
      pre { padding: 14px; border-radius: 10px; overflow: auto; border: 1px solid rgba(127,127,127,.35); background: rgba(127,127,127,.08); }
      .meta { display: grid; grid-template-columns: 140px 1fr; gap: 8px 14px; margin-top: 14px; }
      .k { opacity: .75; }
      .ok { display: inline-block; padding: 2px 8px; border-radius: 999px; border: 1px solid rgba(127,127,127,.35); background: rgba(80, 180, 120, .12); }
    </style>
  </head>
  <body>
    <div class="card">
      <h1><span class="ok">running</span> {{title}}</h1>
      <p>{{message}}</p>

      <div class="meta">
        <div class="k">git hash</div>
        <div><code title="{{gitShaFull}}">{{gitShaShort}}</code></div>
        <div class="k">status</div>
        <div><code>{{statusCode}}</code></div>
      </div>

      <p style="margin-top: 18px; opacity: .85;">Try proxying SVN HTTPS like this:</p>
      <pre><code>/api/https/&lt;svn-host&gt;/&lt;svn-path&gt;
/api/http/&lt;svn-host&gt;/&lt;svn-path&gt;</code></pre>
    </div>
  </body>
</html>
